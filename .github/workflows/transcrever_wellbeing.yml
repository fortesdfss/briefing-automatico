name: Transcrever Wellbeing

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  transcrever:
    # Só roda em issues cujo título começa com "wellbeing:"
    if: startsWith(github.event.issue.title, 'wellbeing:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Transcrever resposta para wellbeing.json
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python connectors/garmin/transcrever_wellbeing.py

      - name: Commit do wellbeing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wellbeing.json
          git diff --staged --quiet || git commit -m "wellbeing: ${{ github.event.issue.title }}"
          git push

      - name: Fechar a issue com confirmação
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Registrado no wellbeing.json. Pode fechar — feito automaticamente."
          gh issue close ${{ github.event.issue.number }}
